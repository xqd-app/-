<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management</title>
    <style>
        body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#333;}
        .card{max-width:420px;margin:5rem auto;padding:2.2rem 2.2rem 1.5rem 2.2rem;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(102,126,234,0.10);}
        .user-header{display:flex;align-items:center;gap:1.2rem;margin-bottom:1.2rem;}
        .avatar{width:56px;height:56px;border-radius:50%;background:#e3e8ff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(102,126,234,0.08);font-size:2rem;color:#667eea;}
        .user-info{flex:1;}
        .user-info .name{font-size:1.18rem;font-weight:600;color:#667eea;}
        .user-info .email{font-size:0.98rem;color:#888;margin-top:2px;}
        h2{text-align:center;color:#667eea;margin-bottom:1.2rem;}
        label{display:block;margin:0.7rem 0 0.2rem 0;}
        input{width:100%;padding:0.6rem;border:1.5px solid #e0e0e0;border-radius:7px;background:#f7f7fa;font-size:1rem;transition:border 0.2s;}
        input:focus{border-color:#667eea;outline:none;}
        button{width:100%;padding:0.8rem;background:linear-gradient(90deg,#667eea 0%,#8ca6db 100%);color:#fff;border:none;border-radius:7px;cursor:pointer;margin-top:0.7rem;font-size:1.08rem;font-weight:600;box-shadow:0 2px 8px rgba(102,126,234,0.08);transition:background 0.3s;}
        button:hover{background:linear-gradient(90deg,#8ca6db 0%,#667eea 100%);}
        .message{margin-top:0.7rem;font-size:0.98rem;color:#e74c3c;min-height:1.2em;}
        a.back{display:block;text-align:center;margin-top:1.2rem;color:#667eea;text-decoration:none;}
    </style>
</head>
<body>
    <div class="card">
        <h2>User Management</h2>
        <div class="user-header">
            <div class="avatar" id="user-avatar">👤</div>
            <div class="user-info">
                <div class="name" id="info-name">未登录</div>
                <div class="email" id="info-email"></div>
            </div>
        </div>
        <hr />
        <h3 style="margin-top:1.2rem;">修改密码</h3>
        <label for="old-pass">旧密码</label>
        <input type="password" id="old-pass" />
        <label for="new-pass">新密码</label>
        <input type="password" id="new-pass" />
        <button id="submit-pass">提交</button>
        <div id="pass-msg" class="message"></div>
        <a href="index.html" class="back">返回主页</a>
    </div>

    <script>
        // fetch current profile from backend
        fetch('/api/user/profile')
            .then(resp => resp.json())
            .then(data => {
                document.getElementById('info-name').textContent = data.name || '未登录';
                document.getElementById('info-email').textContent = data.email || '';
                // 显示头像（如有 avatar 字段，否则用首字母或默认图标）
                const avatarEl = document.getElementById('user-avatar');
                if (data.avatar) {
                    avatarEl.innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar">`;
                } else if (data.name) {
                    avatarEl.textContent = data.name[0].toUpperCase();
                } else {
                    avatarEl.textContent = '👤';
                }
            }).catch(err => {
                document.getElementById('info-name').textContent = '获取失败';
                document.getElementById('user-avatar').textContent = '👤';
                console.error(err);
            });

        document.getElementById('submit-pass').addEventListener('click', () => {
            const oldp = document.getElementById('old-pass').value;
            const newp = document.getElementById('new-pass').value;
            const msg = document.getElementById('pass-msg');
            if (!oldp || !newp) {
                msg.textContent = '请填写旧密码和新密码';
                return;
            }
            fetch('/api/user/change-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({old_password: oldp, new_password: newp})
            })
            .then(r=>r.json())
            .then(res=>{
                if(res.error){
                    msg.style.color = '#e74c3c';
                    msg.textContent = res.error;
                } else {
                    msg.style.color = '#27ae60';
                    msg.textContent = '密码更新成功';
                }
            }).catch(err=>{
                msg.textContent='请求失败';
                console.error(err);
            });
        });
    </script>
</body>
</html>
